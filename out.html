<!DOCTYPE html>
<html lang="pa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ਤਿਆਰ ਸਮਾਨ - ਐਂਟਰੀ</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
  <div class="max-w-4xl mx-auto bg-white p-6 rounded-2xl">
    <a href="index.html" class="text-blue-600">⬅️ ਮੁੱਖ ਸਫ਼ਾ</a>
    <h2 class="text-xl font-bold my-4">ਤਿਆਰ ਸਮਾਨ (ਬਾਹਰ)</h2>
    <div id="pendingList" class="space-y-2"></div>
  </div>

  <script>
    const records = JSON.parse(localStorage.getItem('grindingRecords') || '[]');
    const container = document.getElementById('pendingList');
    records.forEach(r => {
      container.innerHTML += `<div class="p-3 border rounded-xl flex justify-between">
        <span>${r.customerName} (${r.material})</span>
        <button onclick="markOut('${r.id}')" class="bg-green-600 text-white px-3 py-1 rounded">ਬਾਹਰ ਕਰੋ</button>
      </div>`;
    });

    window.markOut = (id) => {
      const weight = prompt("ਬਾਹਰ ਨਿਕਲੇ ਵਜ਼ਨ (kg):");
      if(!weight) return;
      let outData = JSON.parse(localStorage.getItem('outRecords') || '[]');
      outData.push({id, weight, outDate: new Date().toLocaleString()});
      localStorage.setItem('outRecords', JSON.stringify(outData));
      alert("ਸੇਵ ਹੋ ਗਿਆ!");
    };
  </script>
</body>
</html>
