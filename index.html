<!DOCTYPE html>
<html lang="pa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ਨੰਬਰਦਾਰ ਫਲੋਰ ਮਿਲ - ਐਂਟਰੀ</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
  <div class="max-w-md mx-auto bg-white shadow-xl rounded-2xl p-6">
    <h1 class="text-2xl font-bold text-center mb-6">ਨੰਬਰਦਾਰ ਫਲੋਰ ਮਿਲ</h1>
    <form id="entryForm" class="space-y-4">
      <input type="datetime-local" id="dateTime" required class="w-full p-2 border rounded-xl">
      <input type="number" id="queueNumber" placeholder="ਕਤਾਰ ਨੰਬਰ" required class="w-full p-2 border rounded-xl">
      <input type="text" id="customerName" placeholder="ਗਾਹਕ ਦਾ ਨਾਂ" required class="w-full p-2 border rounded-xl">
      <input type="text" id="village" placeholder="ਪਿੰਡ" required class="w-full p-2 border rounded-xl">
      <select id="material" required class="w-full p-2 border rounded-xl">
        <option value="">ਸਮੱਗਰੀ ਚੁਣੋ</option>
        <option>ਕਣਕ</option><option>ਮੱਕੀ</option><option>ਸਰੋਂ</option><option>ਹਲਦੀ</option>
      </select>
      <input type="number" step="0.001" id="weight" placeholder="ਵਜ਼ਨ (kg)" required class="w-full p-2 border rounded-xl">
      <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-xl">ਸੇਵ ਕਰੋ</button>
    </form>
    <div class="mt-4 flex gap-2">
      <a href="out.html" class="flex-1 text-center bg-blue-600 text-white py-2 rounded-xl">ਬਾਹਰ ਐਂਟਰੀ</a>
      <a href="check.html" class="flex-1 text-center bg-orange-600 text-white py-2 rounded-xl">ਰਿਪੋਰਟ</a>
    </div>
  </div>

  <script>
    document.getElementById('dateTime').value = new Date().toISOString().slice(0,16);
    document.getElementById('entryForm').onsubmit = (e) => {
      e.preventDefault();
      const data = {
        id: document.getElementById('queueNumber').value,
        dateTime: document.getElementById('dateTime').value,
        customerName: document.getElementById('customerName').value,
        village: document.getElementById('village').value,
        material: document.getElementById('material').value,
        weight: document.getElementById('weight').value
      };
      let records = JSON.parse(localStorage.getItem('grindingRecords') || '[]');
      records.push(data);
      localStorage.setItem('grindingRecords', JSON.stringify(records));
      alert('ਸੇਵ ਹੋ ਗਿਆ!');
      e.target.reset();
    };
  </script>
</body>
</html>
